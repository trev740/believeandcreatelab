<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >

    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>YouTube Bridge Player</title>

<body>
    <div id="player"></div>

    <script>
        function postToApp(message) {
            try {
                window.webkit.messageHandlers.youtubeStatus.postMessage(message);
            } catch (error) {
                console.log("Not running inside WKWebView:", message);
            }
        }

        function getVideoID() {
            const params = new URLSearchParams(window.location.search);
            return params.get("v") || "ZihgmNuSrZ8";
        }

        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";

        const firstScriptTag = document.getElementsByTagName("script")[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player = null;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player("player", {
                width: "100%",
                height: "100%",
                videoId: getVideoID(),
                playerVars: {
                    playsinline: 1,
                    rel: 0,
                    controls: 0,
                    fs: 1,
                    iv_load_policy: 3,
                    disablekb: 1
                },
                events: {
                    onReady: function () {
                        postToApp("ready");
                        sendStatus();
                    },
                    onStateChange: function (event) {
                        postToApp("state:" + event.data);
                        sendStatus();
                    },
                    onError: function (event) {
                        postToApp("error:" + event.data);
                    }
                }
            });
        }

        window.playerBridge = {
            playVideo: function () {
                if (player) {
                    player.playVideo();
                }
            },

            pauseVideo: function () {
                if (player) {
                    player.pauseVideo();
                }
            },

            seekTo: function (seconds) {
                if (player) {
                    player.seekTo(seconds, true);
                    sendStatus();
                }
            },

            sendStatus: function () {
                sendStatus();
            }
        };

        function sendStatus() {
            if (!player || typeof player.getCurrentTime !== "function") {
                return;
            }

            const current = player.getCurrentTime() || 0;
            const duration = player.getDuration() || 0;

            postToApp("status:" + current + "|" + duration);
        }

        setInterval(sendStatus, 500);
    </script>
</body>
</html>
